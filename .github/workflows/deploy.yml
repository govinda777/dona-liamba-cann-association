name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Deploy Frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ]; then
            echo "Error: VERCEL_TOKEN or VERCEL_ORG_ID is empty."
            echo "Please ensure you have added VERCEL_TOKEN and VERCEL_ORG_ID secrets to your GitHub repository."
            exit 1
          fi
          vercel deploy --prod --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --cwd=apps/frontend --yes

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Deploy API to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ]; then
            echo "Error: VERCEL_TOKEN or VERCEL_ORG_ID is empty."
            echo "Please ensure you have added VERCEL_TOKEN and VERCEL_ORG_ID secrets to your GitHub repository."
            exit 1
          fi
          vercel deploy --prod --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --cwd=apps/api --yes
